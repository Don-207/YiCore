compatible: "yi,soft-i2c"
driver: "soft-i2c"
header: "yi_soft_i2c.h"
define: "YI_SOFT_I2C_DEFINE_LEVEL"

properties:
  scl-gpio:
    type: phandle
    required: true
  sda-gpio:
    type: phandle
    required: true
  clock-frequency:
    type: int
    default: 50000
  stretch-timeout-us:
    type: int
    default: 1000
  recovery-clocks:
    type: int
    default: 9
  init-level:
    type: string
    default: post-kernel
  init-priority:
    type: int
    default: 20
